name: Build Add-ons
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  check:
    name: Check for missing images
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.check.outputs.addons }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: check
        run: node .github/workflows/scripts/get-latest-tags.cjs >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.addon.dir }} (${{ matrix.arch }})
    needs: check
    if: needs.check.outputs.addons != '[]' && needs.check.outputs.addons != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check.outputs.addons) }}
        arch: ["amd64", "aarch64"]
        os: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          context: ./${{ matrix.addon.dir }}
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ghcr.io/easrng/${{ matrix.arch }}-ha-addon-${{ matrix.addon.dir }}
          image-tags: |
            ${{ matrix.addon.version }}
            latest
          push: "true"
          version: ${{ matrix.addon.version }}

  manifest:
    name: Publish manifest for ${{ matrix.addon.dir }}
    needs: [check, build]
    if: needs.check.outputs.addons != '[]' && needs.check.outputs.addons != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check.outputs.addons) }}
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: '["amd64","aarch64"]'
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ha-addon-${{ matrix.addon.dir }}
          image-tags: |
            ${{ matrix.addon.version }}
            latest
