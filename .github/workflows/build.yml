name: Build Add-ons
on:
  push:
    branches:
      - master
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: read
  packages: write  # Required to push to GHCR
  id-token: write  # Required for Cosign signing

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.discover.outputs.addons }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required to access commit history for git diff
      
      - name: Discover changed add-ons
        id: discover
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger: building all add-ons."
            ADDONS=$(find . -mindepth 1 -maxdepth 1 -type d ! -name '.*' -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          else
            echo "Push event: identifying changed directories..."
            
            # Compare the commit before the push to the current commit
            # (Fallback to comparing HEAD~1 if it's a new branch with a 000000 base)
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            else
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
            fi
            
            # Extract top-level directories, get unique list
            TOP_LEVEL_DIRS=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
            
            VALID_ADDONS=()
            for dir in $TOP_LEVEL_DIRS; do
              # Ensure it is currently a directory (not deleted) and doesn't start with '.' (like .github)
              if [ -d "$dir" ] && [[ ! "$dir" == .* ]]; then
                VALID_ADDONS+=("$dir")
              fi
            done
            
            # Format as JSON array for the matrix
            if [ ${#VALID_ADDONS[@]} -eq 0 ]; then
              ADDONS="[]"
            else
              ADDONS=$(printf '%s\n' "${VALID_ADDONS[@]}" | jq -R -s -c 'split("\n")[:-1]')
            fi
          fi
          
          echo "Discovered add-ons to build: $ADDONS"
          echo "addons=$ADDONS" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.addon }} (${{ matrix.arch }})
    needs: init
    if: needs.init.outputs.addons != '[]'  # Skip if no add-on folders changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.init.outputs.addons) }}
        arch: ["amd64"]
    steps:
      - uses: actions/checkout@v6
      
      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          context: ./${{ matrix.addon }}
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ghcr.io/${{ github.repository_owner }}/ha-addon-${{ matrix.addon }}
          image-tags: |
            latest
            ${{ github.sha }}
          push: "true"
          version: latest

  manifest:
    name: Publish manifest for ${{ matrix.addon }}
    needs: [init, build]
    if: needs.init.outputs.addons != '[]'  # Skip if no add-on folders changed
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.init.outputs.addons) }}
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ghcr.io/${{ github.repository_owner }}/ha-addon-${{ matrix.addon }}
          image-tags: |
            latest
            ${{ github.sha }}
